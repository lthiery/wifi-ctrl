name: Continuous Integration

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          default: true
          override: true
          components: clippy, rustfmt

      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.5.0
        with:
          access_token: ${{ github.token }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features -- -Dclippy::all

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test

      # Build the docs the way docs.rs will, treating rustdoc warnings
      # (broken intra-doc links, bad code fences, etc.) as errors
      - name: Docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  msrv:
    name: Minimum supported Rust version
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.70.0"
          default: true
          override: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      # Verify the library builds on the declared rust-version. --no-dev-deps
      # skips dev-only crates: they don't affect downstream consumers and their
      # newer releases no longer resolve on this old toolchain.
      - name: Check MSRV
        run: cargo hack --no-dev-deps check
